version: '3.8'

services:
  # Frontend - React/Vite app served by Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - resumate-network

  # Backend - Node.js/Express API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CORS_ORIGIN=http://localhost
      - AUTH_TOKEN=${AUTH_TOKEN:-resumate-hackathon-spine-hangar-2026}
      - DB_PATH=/data/resumate.db
    volumes:
      - backend-data:/data
    restart: unless-stopped
    networks:
      - resumate-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  resumate-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
